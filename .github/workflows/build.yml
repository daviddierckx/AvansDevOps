name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze (.NET Framework)
    runs-on: windows-latest
    env:
      SONAR_SCANNER_VERSION: 11.2.0.135473

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Download SonarScanner for .NET Framework
        shell: powershell
        run: |
          $version   = $env:SONAR_SCANNER_VERSION
          $url       = "https://github.com/SonarSource/sonar-scanner-msbuild/releases/download/$version/sonar-scanner-$version-net-framework.zip"
          $zip       = "$env:RUNNER_TEMP\sonar-scanner.zip"
          $targetDir = "$env:RUNNER_TEMP\sonar-scanner-msbuild"

          Write-Host "Downloading SonarScanner $version..."
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $targetDir -Force
          Write-Host "Extracted to $targetDir"

      - name: Download nuget.exe
        shell: powershell
        run: |
          $nugetDir = "$env:RUNNER_TEMP\nuget"
          New-Item -ItemType Directory -Force -Path $nugetDir | Out-Null
          Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile "$nugetDir\nuget.exe" -UseBasicParsing

      - name: Begin SonarQube analysis
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          $exe = (Get-ChildItem "$env:RUNNER_TEMP\sonar-scanner-msbuild" -Recurse -Filter "SonarScanner.MSBuild.exe" |
                  Select-Object -First 1).FullName
          if (-not $exe) { throw "SonarScanner.MSBuild.exe not found" }

          & "$exe" begin /k:"daviddierckx_AvansDevOps" /o:"daviddierckx-1" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io"

      - name: Restore NuGet packages
        shell: powershell
        run: |
          $sln = (Get-ChildItem -Recurse -Filter "*.sln" | Select-Object -First 1).FullName
          if (-not $sln) { throw "No .sln file found" }
          $nuget = "$env:RUNNER_TEMP\nuget\nuget.exe"
          & "$nuget" restore "$sln"

      - name: Build solution
        shell: powershell
        run: |
          $sln = (Get-ChildItem -Recurse -Filter "*.sln" | Select-Object -First 1).FullName
          if (-not $sln) { throw "No .sln file found" }
          msbuild "$sln" /t:Rebuild /p:Configuration=Release /p:platform="Any CPU"

      - name: End SonarQube analysis
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          $exe = (Get-ChildItem "$env:RUNNER_TEMP\sonar-scanner-msbuild" -Recurse -Filter "SonarScanner.MSBuild.exe" |
                  Select-Object -First 1).FullName
          if (-not $exe) { throw "SonarScanner.MSBuild.exe not found" }

          & "$exe" end /d:sonar.token="$env:SONAR_TOKEN"