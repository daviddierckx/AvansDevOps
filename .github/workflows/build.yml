name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze (.NET Framework)
    runs-on: windows-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      - name: Download SonarScanner for MSBuild
        shell: powershell
        run: |
          $scannerDir = "$env:RUNNER_TEMP\sonar-scanner-msbuild"
          New-Item -ItemType Directory -Force -Path $scannerDir | Out-Null

          # Query GitHub API for the latest release and find the appropriate zip asset.
          $apiUrl = "https://api.github.com/repos/SonarSource/sonar-scanner-msbuild/releases/latest"
          # GitHub API requires a user-agent header
          $headers = @{ 'User-Agent' = 'GitHubActions' }
          $release = Invoke-RestMethod -Uri $apiUrl -UseBasicParsing -Headers $headers

          # Debug: list available assets
          Write-Host "Found assets:" 
          $release.assets | ForEach-Object { Write-Host " - $($_.name)" }

          # Try to find a zip asset that contains 'msbuild' in the name (case-insensitive)
          $asset = $release.assets | Where-Object { $_.name -match '(?i)msbuild' -and $_.name -match '(?i)\.zip$' } | Select-Object -First 1

          if ($asset) {
            $zip = "$env:RUNNER_TEMP\$($asset.name)"
            Write-Host "Downloading $($asset.name) from $($asset.browser_download_url)"
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zip -UseBasicParsing
            Expand-Archive -Path $zip -DestinationPath $scannerDir -Force
          }
          else {
            Write-Host "No matching asset found in GitHub release - attempting SonarSource distribution URL as fallback"
            $fallbackUrl = "https://binaries.sonarsource.com/Distribution/sonar-scanner-msbuild/sonar-scanner-msbuild.zip"
            $zip = "$env:RUNNER_TEMP\sonar-scanner-msbuild.zip"
            try {
              Invoke-WebRequest -Uri $fallbackUrl -OutFile $zip -UseBasicParsing -ErrorAction Stop
              Expand-Archive -Path $zip -DestinationPath $scannerDir -Force
            }
            catch {
              throw "Failed to download SonarScanner for MSBuild via GitHub releases and fallback URL. Assets found: $($release.assets | ForEach-Object { $_.name } -join ', ')"
            }
          }

      - name: Download nuget.exe
        shell: powershell
        run: |
          $nugetDir = "$env:RUNNER_TEMP\nuget"
          New-Item -ItemType Directory -Force -Path $nugetDir | Out-Null
          $nugetExe = Join-Path $nugetDir "nuget.exe"
          Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile $nugetExe -UseBasicParsing

      - name: Begin SonarQube analysis
        shell: powershell
        run: |
          $sonarScannerExe = (Get-ChildItem -Path "$env:RUNNER_TEMP\sonar-scanner-msbuild" -Recurse -Filter "SonarScanner.MSBuild.exe" | Select-Object -First 1).FullName
          if (-not $sonarScannerExe) { throw "SonarScanner.MSBuild.exe not found" }

          & "$sonarScannerExe" begin /k:"daviddierckx_AvansDevOps" /o:"daviddierckx-1" /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

      - name: Restore NuGet packages
        shell: powershell
        run: |
          $sln = (Get-ChildItem -Path . -Filter *.sln -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $sln) { throw "No .sln file found in repository" }
          $nugetExe = (Get-ChildItem -Path "$env:RUNNER_TEMP\nuget" -Recurse -Filter "nuget.exe" | Select-Object -First 1).FullName
          & "$nugetExe" restore "$sln"

      - name: Build solution (MSBuild)
        shell: powershell
        run: |
          $sln = (Get-ChildItem -Path . -Filter *.sln -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $sln) { throw "No .sln file found in repository" }
          msbuild "$sln" /t:Rebuild /p:Configuration=Release

      - name: End SonarQube analysis
        shell: powershell
        run: |
          $sonarScannerExe = (Get-ChildItem -Path "$env:RUNNER_TEMP\sonar-scanner-msbuild" -Recurse -Filter "SonarScanner.MSBuild.exe" | Select-Object -First 1).FullName
          if (-not $sonarScannerExe) { throw "SonarScanner.MSBuild.exe not found" }

          & "$sonarScannerExe" end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
